name: Unlock Modules

on:
  push:
    branches:
      - "**"

permissions:
  contents: read
  issues: write

jobs:
  test-and-unlock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

          GH_REPO: ${{ github.repository }}
      - name: Run Module 03 tests
        run: dotnet test modules/03-csharp-basics/Tests/Tests.csproj --configuration Release
          set -euo pipefail

          tail -n +3 "$TEMPLATE_PATH" > issue-body.md
          if gh issue list --repo "$GH_REPO" --state all --search "$title in:title" --json title --jq 'map(select(.title == '"'"'"$title'"'"'"')) | length' | grep -q '^0$'; then
            gh issue create --repo "$GH_REPO" --title "$title" --body-file issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMPLATE_PATH: .github/ISSUE_TEMPLATE/module-04-unlock.md
        run: |
          title=$(head -n 1 "$TEMPLATE_PATH" | sed 's/^# //')
          if gh issue list --state all --search "$title in:title" --json title --jq 'map(select(.title == "'"$title"'")) | length' | grep -q '^0$'; then
            gh issue create --title "$title" --body-file "$TEMPLATE_PATH"
          else
            echo "Issue already exists: $title"
          fi

          GH_REPO: ${{ github.repository }}
      - name: Run Module 04 tests
        run: dotnet test modules/04-algorithms/Tests/Tests.csproj --configuration Release
          set -euo pipefail

          tail -n +3 "$TEMPLATE_PATH" > issue-body.md
          if gh issue list --repo "$GH_REPO" --state all --search "$title in:title" --json title --jq 'map(select(.title == '"'"'"$title'"'"'"')) | length' | grep -q '^0$'; then
            gh issue create --repo "$GH_REPO" --title "$title" --body-file issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMPLATE_PATH: .github/ISSUE_TEMPLATE/module-05-unlock.md
        run: |
          title=$(head -n 1 "$TEMPLATE_PATH" | sed 's/^# //')
          if gh issue list --state all --search "$title in:title" --json title --jq 'map(select(.title == "'"$title"'")) | length' | grep -q '^0$'; then
            gh issue create --title "$title" --body-file "$TEMPLATE_PATH"
          else
            echo "Issue already exists: $title"
          fi

          GH_REPO: ${{ github.repository }}
      - name: Run Module 05 tests
        run: dotnet test modules/05-console-app/Tests/Tests.csproj --configuration Release
          set -euo pipefail

          tail -n +3 "$TEMPLATE_PATH" > issue-body.md
          if gh issue list --repo "$GH_REPO" --state all --search "$title in:title" --json title --jq 'map(select(.title == '"'"'"$title'"'"'"')) | length' | grep -q '^0$'; then
            gh issue create --repo "$GH_REPO" --title "$title" --body-file issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMPLATE_PATH: .github/ISSUE_TEMPLATE/module-06-unlock.md
        run: |
          title=$(head -n 1 "$TEMPLATE_PATH" | sed 's/^# //')
          if gh issue list --state all --search "$title in:title" --json title --jq 'map(select(.title == "'"$title"'")) | length' | grep -q '^0$'; then
            gh issue create --title "$title" --body-file "$TEMPLATE_PATH"
          else
            echo "Issue already exists: $title"
          fi